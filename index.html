<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart IT Lab</title>
    <!--
      Anti-flicker script: apply saved theme + language direction BEFORE
      any CSS or React renders, so there is no flash of wrong theme/direction.
    -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('theme') || localStorage.getItem('i18nextTheme');
          if (theme === 'light') {
            document.documentElement.classList.add('light');
          } else {
            // Default to dark
            document.documentElement.classList.add('dark');
          }
          var lang = localStorage.getItem('i18nextLng') || 'en';
          document.documentElement.lang = lang;
          document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
