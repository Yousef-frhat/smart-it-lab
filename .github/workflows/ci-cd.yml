name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SmartBackend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: SmartBackend/package-lock.json
      - run: npm ci
      - run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_at_least_32_characters_long_xx
          JWT_REFRESH_SECRET: test_refresh_secret_at_least_32_chars_x

  frontend-test:
    name: Frontend Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: https://beautiful-encouragement-production.up.railway.app/api

  deploy:
    name: Deploy to Railway
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy Backend
        run: railway up --service beautiful-encouragement --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Deploy Frontend
        run: railway up --service smart-it-lab --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
