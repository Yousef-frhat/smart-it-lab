name: CI / Security Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_BACKEND:  ghcr.io/${{ github.repository }}/backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/frontend

jobs:
  # ─────────────────────────────────────────────────────────────────
  # 1. Backend: Lint + Tests + Coverage
  # ─────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Test & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SmartBackend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: SmartBackend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (all source files)
        run: |
          find src -name "*.js" | xargs node --check

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: SmartBackend/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────
  # 2. Frontend: Build
  # ─────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────
  # 3. Security: Dependency Vulnerability Scan
  # ─────────────────────────────────────────────────────────────────
  security-audit:
    name: Security — Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
        continue-on-error: true   # report but don't fail CI on warnings

      - name: Audit backend dependencies
        run: npm audit --audit-level=high
        working-directory: SmartBackend
        continue-on-error: true

      - name: Check for secrets in code (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────
  # 4. Docker: Build images (on main branch only)
  # ─────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, security-audit]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./SmartBackend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Scan Backend image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          format:    table
          exit-code: 1
          severity:  CRITICAL
        continue-on-error: true
