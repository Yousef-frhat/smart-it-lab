# ── Rate limiting zones ───────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=10r/m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────
server {
  listen 80;
  server_name _;

  # Allow Let's Encrypt ACME challenge
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Redirect all other HTTP traffic to HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

# ── HTTPS server ──────────────────────────────────────────────────
server {
  listen 443 ssl http2;
  server_name _;

  root  /usr/share/nginx/html;
  index index.html;

  # ── SSL ────────────────────────────────────────────────────────
  ssl_certificate     /etc/nginx/ssl/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 1d;

  # ── Security Headers (Fix #10) ─────────────────────────────────
  # HSTS: force HTTPS for 1 year, include subdomains
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  # Prevent clickjacking
  add_header X-Frame-Options "DENY" always;

  # Prevent MIME sniffing
  add_header X-Content-Type-Options "nosniff" always;

  # XSS protection (legacy browsers)
  add_header X-XSS-Protection "1; mode=block" always;

  # Referrer policy — don't leak URL to third parties
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Permissions policy — disable unneeded browser features
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

  # Content Security Policy
  # Adjust 'connect-src' to your actual API domain in production
  add_header Content-Security-Policy "
    default-src 'self';
    script-src  'self' 'unsafe-inline';
    style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src    'self' https://fonts.gstatic.com data:;
    img-src     'self' data: https://res.cloudinary.com https://avatars.githubusercontent.com https://lh3.googleusercontent.com;
    connect-src 'self' https:;
    frame-src   'none';
    object-src  'none';
    base-uri    'self';
    form-action 'self';
  " always;

  # ── Gzip Compression ───────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

  # ── Static Assets Cache ────────────────────────────────────────
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
    expires     1y;
    add_header  Cache-Control "public, immutable";
    # Re-apply security headers (add_header inheritance rule)
    add_header  X-Content-Type-Options "nosniff" always;
    add_header  X-Frame-Options "DENY" always;
  }

  # ── React SPA fallback ─────────────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ── API Rate Limiting + Proxy ──────────────────────────────────
  location /api/auth {
    limit_req zone=auth_limit burst=5 nodelay;
    limit_req_status 429;

    proxy_pass         http://backend:5000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        '';
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
  }

  location /api {
    limit_req zone=api_limit burst=20 nodelay;
    limit_req_status 429;

    proxy_pass         http://backend:5000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        '';
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  # ── SSE — disable buffering for real-time events ───────────────
  location /api/events {
    limit_req zone=api_limit burst=5 nodelay;

    proxy_pass         http://backend:5000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        '';
    proxy_buffering    off;
    proxy_cache        off;
    proxy_read_timeout 3600s;       # SSE connections stay open
    chunked_transfer_encoding on;
  }

  # ── Block common attack paths ──────────────────────────────────
  location ~ /\. {
    deny all;
    return 404;
  }

  location ~* \.(env|log|bak|sql|conf|config|ini)$ {
    deny all;
    return 404;
  }
}
